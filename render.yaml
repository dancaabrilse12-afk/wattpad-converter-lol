services:
  - type: web
    name: wattpad-converter-api
    env: node
    region: oregon # Oregon suele ser más estable para la salida hacia servidores de Wattpad
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: NODE_VERSION
        value: 18.x # Asegura compatibilidad con las librerías de scraping modernas
      - key: GENERATE_SOURCEMAP
        value: false # Ahorra memoria RAM durante la construcción
    healthCheckPath: / # Asegúrate de que tu server.js tenga una ruta app.get('/') que responda 200 OK
    autoDeploy: true
    
